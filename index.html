<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMS Hiring Form</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center;
      color: white;
      text-align: center;
      padding: 20px;
    }
    #emsLogo {
      width: 150px;
      margin-bottom: 20px;
    }
    form {
      background-color: rgba(0, 0, 0, 0.7);
      padding: 20px;
      border-radius: 10px;
      width: 60%;
      margin: auto;
    }
    input, textarea, button {
      width: 100%;
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }
    button {
      background-color: #e74c3c;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #c0392b;
    }
    a {
      color: #00bcd4;
    }
  </style>
</head>
<body>
  <img id="emsLogo" src="ems_logo.png" alt="EMS Logo">
  <h1>EMS Hiring Application</h1>
  <form id="emsForm">
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" required><br><br>

    <label for="age">Age:</label>
    <input type="number" id="age" name="age" required><br><br>

    <label for="experience">Experience (if any):</label>
    <textarea id="experience" name="experience" rows="4"></textarea><br><br>

    <label for="reason">Why do you want to join EMS?</label>
    <textarea id="reason" name="reason" rows="4" required></textarea><br><br>

    <button type="submit">Submit Application</button>
  </form>

  <p>Check <a href="https://discord.gg/kzqKmhSS" target="_blank">this Discord</a> for updates on your application.</p>

  <script>
    document.getElementById('emsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = {
        name: document.getElementById('name').value,
        age: document.getElementById('age').value,
        experience: document.getElementById('experience').value,
        reason: document.getElementById('reason').value
      };

      const webhookURL = 'YOUR_WEBHOOK_URL_HERE';

      try {
        const response = await fetch(webhookURL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });

        if (response.ok) {
          alert('Application submitted successfully!');
          document.getElementById('emsForm').reset();
        } else {
          alert('Error submitting application. Please try again later.');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error submitting application. Please try again later.');
      }
    });
  </script>
</body>
</html>
